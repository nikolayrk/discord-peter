name: Test OpenTofu Configuration

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true

jobs:
  test-tofu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive
        working-directory: tofu

      - name: OpenTofu Init
        run: tofu init
        working-directory: tofu

      - name: OpenTofu Validate
        run: tofu validate
        working-directory: tofu
